// Load from Firebase first, fall back to Supabase
function dbLoadCalendar(id) {
  return FSdb.collection("calendars").doc(id).get().then(function(doc) {
    if(doc.exists) {
      var data = doc.data();
      return {
        id: id,
        name: data.name||"",
        password: data.password||null,
        email: data.email||null,
        people: typeof data.people==="string" ? JSON.parse(data.people) : (data.people||[]),
        events: typeof data.events==="string" ? JSON.parse(data.events) : (data.events||[])
      };
    }
    // Not in Firebase, try Supabase
    return SBdb.from("calendars").select("*").eq("id",id).then(function(r){
      if(r.error||!r.data||r.data.length===0) return null;
      var cal=r.data[0];
      cal.people = typeof cal.people==="string" ? JSON.parse(cal.people) : (cal.people||[]);
      cal.events = typeof cal.events==="string" ? JSON.parse(cal.events) : (cal.events||[]);
      // Migrate to Firebase
      FSdb.collection("calendars").doc(id).set({
        name:cal.name||"", password:cal.password||null, email:cal.email||null,
        people:JSON.stringify(cal.people), events:JSON.stringify(cal.events)
      }).catch(function(){});
      return cal;
    });
  }).catch(function(err) {
    console.error("Firebase load error:", err);
    // Firebase failed, try Supabase directly
    return SBdb.from("calendars").select("*").eq("id",id).then(function(r){
      if(r.error||!r.data||r.data.length===0) return null;
      var cal=r.data[0];
      cal.people = typeof cal.people==="string" ? JSON.parse(cal.people) : (cal.people||[]);
      cal.events = typeof cal.events==="string" ? JSON.parse(cal.events) : (cal.events||[]);
      return cal;
    }).catch(function(){return null;});
  });
}

function genId() {
  var chars = "abcdefghijklmnopqrstuvwxyz0123456789";
  var id = "cal-";
  for(var i=0;i<8;i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}

// Pattern for event type
function pat(type) {
  if(type==="CE") {
    // Diagonal stripes - dark semi-transparent
    return "repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 8px)";
  } else if(type==="Meet & Greet") {
    // Dots - using radial gradient
    return "radial-gradient(circle, rgba(0,0,0,0.2) 1.5px, transparent 1.5px)";
  } else {
    // Crosshatch grid
    return "repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 10px), repeating-linear-gradient(90deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 10px)";
  } else if(type==="Family Time") {
    return "repeating-linear-gradient(135deg, rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 2px, transparent 2px, transparent 6px)";
  } else if(type==="Date Night") {
    return "repeating-linear-gradient(90deg, rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 2px, transparent 2px, transparent 8px)";
  } else {
    return "repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 10px), repeating-linear-gradient(90deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 10px)";
}

// Build gradient from multiple people colors
function makeGradient(colors) {
  if(!colors||colors.length===0) return "#eee";
  if(colors.length===1) return colors[0];
  var pct = Math.round(100/colors.length);
  var stops = [];
  for(var i=0;i<colors.length;i++) {
    stops.push(colors[i]+" "+(i*pct)+"%");
    stops.push(colors[i]+" "+((i+1)*pct)+"%");
  }
  return "linear-gradient(135deg,"+stops.join(",")+")";
}

function exportICS(events, people) {
  function gp(id){for(var i=0;i<people.length;i++){if(people[i].id===id)return people[i];}return {name:"?"};}
  function fmt(ds){return ds.replace(/-/g,"")+"T090000Z";}
  var lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Poly Tetris//EN","CALSCALE:GREGORIAN"];
  for(var i=0;i<events.length;i++){
    var ev=events[i];
    var attendeeIds = ev.attendeeIds||[ev.personId];
    var names = attendeeIds.map(function(id){return gp(id).name;}).join(", ");
    lines.push("BEGIN:VEVENT","UID:"+ev.id+"@polytris","DTSTART:"+fmt(ev.date),"DTEND:"+fmt(ev.date),"SUMMARY:"+ev.type+" - "+names,"DESCRIPTION:"+(ev.note||""),"END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  var blob=new Blob([lines.join("\r\n")],{type:"text/calendar"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="polytris.ics";a.click();
  URL.revokeObjectURL(url);
}

// EventChip with gradient + pattern overlay
function EventChip(props) {
  var ev=props.ev, people=props.people, onClick=props.onClick, compact=props.compact;
  var onDragStart=props.onDragStart, onDragEnd=props.onDragEnd;

  function gp(id){for(var i=0;i<people.length;i++){if(people[i].id===id)return people[i];}return {name:"?",color:"#aaa",light:"#eee"};}

  var attendeeIds = ev.attendeeIds || [ev.personId];
  var attendees = attendeeIds.map(function(id){return gp(id);});
  var colors = attendees.map(function(p){return p.color;});
  var gradient = makeGradient(colors);
  var time = timeLabel(ev.startTime, ev.endTime);
  var names = attendees.map(function(p){return p.name;}).join(", ");

  var chipStyle = {
    overflow:"hidden", borderRadius:compact?5:6,
    padding:compact?"2px 6px":"5px 8px",
    fontSize:compact?10:11, fontWeight:600,
    fontFamily:"'DM Mono',monospace",
    whiteSpace:compact?"nowrap":"normal",
    cursor:"grab", position:"relative",
    background:gradient,
    border:"none",
    boxShadow:"0 1px 3px rgba(0,0,0,.15)"
  };

  // Pattern overlay div sits on top of gradient
  var patternBg = pat(ev.type);
  var overlayStyle = {
    position:"absolute", inset:0, pointerEvents:"none",
    backgroundImage:patternBg,
    backgroundSize:ev.type==="Meet & Greet"?"6px 6px":(ev.type==="Hold"?"10px 10px":"8px 8px")
  };

  var content;
  if(compact) {
    content = ev.type+" - "+names+(time?" "+time:"");
  } else {
    var kids=[
      h("div",{key:"t",style:{fontWeight:700}},ev.type),
      h("div",{key:"n",style:{fontWeight:400,opacity:.9,fontSize:10}},names)
    ];
    if(time) kids.push(h("div",{key:"tm",style:{fontWeight:400,fontSize:10,opacity:.8}},time));
    if(ev.note) kids.push(h("div",{key:"nt",style:{fontWeight:400,fontSize:10,opacity:.75}},ev.note));
    content=kids;
  }

  return h("div",{
    className:"event-chip",
    onClick:function(e){e.stopPropagation();onClick(e);},
    draggable:true,
    onDragStart:function(e){e.stopPropagation();onDragStart(e);},
    onDragEnd:function(e){e.stopPropagation();onDragEnd(e);},
    style:chipStyle
  },
    h("div",{style:overlayStyle}),
    h("span",{style:{position:"relative",color:"#fff",textShadow:"0 1px 2px rgba(0,0,0,.4)"}},content)
  );
}

      }).catch(function(){});

    return function(){clearInterval(iv);};

  function persist(ne,np){
    setSync("saving");clearTimeout(timer.current);
    timer.current=setTimeout(function(){
      dbSaveCalendar(calId,np||people,ne).then(function(){setSync("saved");setTimeout(function(){setSync("idle");},2000);}).catch(function(){setSync("error");});
    },600);
  }
  function updEv(ne){setEvents(ne);persist(ne,null);}
  function gp(id){for(var i=0;i<people.length;i++){if(people[i].id===id)return people[i];}return {id:0,name:"?",color:"#aaa",light:"#eee"};}

  function saveName(id){
    var np=people.map(function(p){return p.id===id?{id:p.id,name:nameInput,color:p.color,light:p.light}:p;});
    setPeople(np);setEditingName(null);setSync("saving");
    dbSaveCalendar(calId,np,events).then(function(){setSync("saved");setTimeout(function(){setSync("idle");},2000);}).catch(function(){setSync("error");});
  }

  function addPerson(){
    var nextId=1;
    for(var i=0;i<people.length;i++){if(people[i].id>=nextId)nextId=people[i].id+1;}
    var ci=(people.length)%COLORS.length;
    var np=people.concat([{id:nextId,name:"Person "+nextId,color:COLORS[ci].color,light:COLORS[ci].light}]);
    setPeople(np);setSync("saving");
    dbSaveCalendar(calId,np,events).then(function(){setSync("saved");setTimeout(function(){setSync("idle");},2000);}).catch(function(){setSync("error");});
    setTimeout(function(){setEditingName(nextId);setNameInput("Person "+nextId);},50);
  }

    var end=new Date(wk);end.setDate(end.getDate()+6);
    return MONTHS[wk.getMonth()]+" "+wk.getDate()+" - "+(wk.getMonth()!==end.getMonth()?MONTHS[end.getMonth()]+' ':'')+end.getDate()+", "+end.getFullYear();
  }

  function openAdd(date){

      return e.id===ev.id?{id:e.id,date:e.date,type:e.type,attendeeIds:existing,personId:e.personId,note:e.note,startTime:e.startTime,endTime:e.endTime}:e;
    }));
    setModal(null);
  }

        h("div",{style:{display:"flex",gap:8,marginTop:16}},
          h("button",{onClick:deleteEvent,style:{flex:1,padding:"9px 0",borderRadius:9,background:"#FEE8E8",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#D45050",fontWeight:700}},"DELETE"),
          h("button",{onClick:function(){setModal(null);},style:{flex:1,padding:"9px 0",borderRadius:9,background:"#F5F4F0",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#888",fontWeight:600}},"Cancel"),
          h("button",{onClick:saveEdit,style:{flex:2,padding:"9px 0",borderRadius:9,background:"#1A1A2E",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#E08A2E",fontWeight:700}},"SAVE")
        )
      )
    ):null,

    // JOIN Modal
    canEdit&&modal&&modal.mode==="join"?h("div",{style:ov,onClick:function(){setModal(null);}},
      h("div",{onClick:function(e){e.stopPropagation();},style:mb},
        h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#4CAF6F",letterSpacing:2,marginBottom:4}},"JOIN EVENT"),
        h("div",{style:{fontSize:15,fontWeight:700,color:"#1A1A2E",marginBottom:4}},modal.ev&&modal.ev.type),
        h("div",{style:{fontSize:13,color:"#888",marginBottom:16}},modal.date),
        h("p",{style:{fontSize:13,color:"#555",marginBottom:12}},"Who is joining this event?"),
        h("div",null,people.map(function(p){
          var existing=modal.ev?(modal.ev.attendeeIds||[modal.ev.personId]):[];
          var already=existing.indexOf(p.id)!==-1;
          return h("div",{key:p.id,onClick:function(){if(!already)saveJoin(p.id);},style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,marginBottom:6,background:already?"#F5F4F0":"#fff",border:already?"1.5px solid #ddd":"1.5px solid "+p.color,cursor:already?"default":"pointer",opacity:already?.6:1}},
            h("div",{style:{width:12,height:12,borderRadius:"50%",background:p.color}}),
            h("span",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:already?"#aaa":p.color}},p.name||(p.id+"")),
            already&&h("span",{style:{marginLeft:"auto",fontFamily:"'DM Mono',monospace",fontSize:10,color:"#aaa"}},"already attending")
          );
        })),
        h("button",{onClick:function(){setModal(null);},style:{width:"100%",padding:"9px",borderRadius:9,background:"#F5F4F0",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#888",fontWeight:600,marginTop:12}},"Cancel")
      )
    ):null
  );
}

//  ROOT 
function Root() {
  var hs=useState(window.location.hash.replace("#",""));var calId=hs[0],setCalId=hs[1];
  var cs=useState(null);var cal=cs[0],setCal=cs[1];
  var us=useState(false);var unlocked=us[0],setUnlocked=us[1];
  var crs=useState(false);var creator=crs[0],setCreator=crs[1];
  var vos=useState(false);var viewOnly=vos[0],setViewOnly=vos[1];
  var ls=useState(false);var loading=ls[0],setLoading=ls[1];
  var errs=useState(null);var loadErr=errs[0],setLoadErr=errs[1];

  useEffect(function(){
    if(!calId)return;
    setLoading(true);setLoadErr(null);
    dbLoadCalendar(calId).then(function(data){setCal(data);setLoading(false);}).catch(function(e){
      console.error("Load error:", e);
      setLoadErr("Network error - check your connection and try again.");
      setLoading(false);
    });
  },[calId]);

  function enterCalendar(id, asCreator){
    setCalId(id);setCreator(asCreator);
    if(asCreator)setUnlocked(true);
  }

  if(!calId) return h(LandingPage,{onEnter:enterCalendar});

  if(loading) return h("div",{style:{minHeight:"100vh",background:"#F5F4F0",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{fontFamily:"'DM Mono',monospace",color:"#aaa",fontSize:13,letterSpacing:2}},"LOADING...")
  );

  if(!cal) return h("div",{style:{minHeight:"100vh",background:"#F5F4F0",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{textAlign:"center",padding:20}},
      h("div",{style:{fontFamily:"'DM Mono',monospace",color:"#D45050",fontSize:13,marginBottom:8}},loadErr||"Calendar not found."),
      loadErr&&h("div",{style:{fontFamily:"'DM Mono',monospace",color:"#aaa",fontSize:11,marginBottom:16}},"Try refreshing or switching networks."),
      h("button",{onClick:function(){setLoadErr(null);setLoading(true);dbLoadCalendar(calId).then(function(data){setCal(data);setLoading(false);}).catch(function(e){setLoadErr("Network error - check your connection.");setLoading(false);});},style:{background:"#3A7FD5",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,marginBottom:10,display:"block",width:"100%"}},"RETRY"),
      h("button",{onClick:function(){window.location.hash="";setCalId("");},style:{background:"#1A1A2E",color:"#E08A2E",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,display:"block",width:"100%"}},"GO HOME")
    )
  );

  var hasPassword=cal.password&&cal.password.length>0;
  var canEdit=!hasPassword||unlocked||creator;

  if(hasPassword&&!unlocked&&!creator&&!viewOnly) return h(PasswordGate,{
    password:cal.password,
    calName:cal.name,
    onUnlock:function(){setUnlocked(true);},
    onViewOnly:function(){setViewOnly(true);}
  });

  return h(CalendarApp,{calId:calId,canEdit:canEdit});
}

ReactDOM.createRoot(document.getElementById("root")).render(h(Root,null));
</script>
</body>
</html>
