async function loadFromSupabase() {
  const { data } = await supabase.from("calendar_data").select("value").eq("key", STORAGE_KEY).single();
  return data ? JSON.parse(data.value) : null;
}
async function saveToSupabase(payload) {
  await supabase.from("calendar_data").upsert({ key: STORAGE_KEY, value: JSON.stringify(payload), updated_at: new Date().toISOString() });
}

function getPatternStyle(type, color) {
  const ec = encodeURIComponent(color);
  if (type === "CE") {
    const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"8\" height=\"8\"><line x1=\"0\" y1=\"8\" x2=\"8\" y2=\"0\" stroke=\"" + ec + "\" stroke-width=\"1.5\" stroke-opacity=\"0.18\"/></svg>";
    return { backgroundImage: "url(\"data:image/svg+xml," + encodeURIComponent(svg) + "\")", backgroundSize: "8px 8px" };
  } else if (type === "Meet & Greet") {
    const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"8\" height=\"8\"><circle cx=\"4\" cy=\"4\" r=\"1.2\" fill=\"" + ec + "\" fill-opacity=\"0.25\"/></svg>";
    return { backgroundImage: "url(\"data:image/svg+xml," + encodeURIComponent(svg) + "\")", backgroundSize: "8px 8px" };
  } else {
    const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"10\" height=\"10\"><line x1=\"0\" y1=\"5\" x2=\"10\" y2=\"5\" stroke=\"" + ec + "\" stroke-width=\"1\" stroke-opacity=\"0.2\"/><line x1=\"5\" y1=\"0\" x2=\"5\" y2=\"10\" stroke=\"" + ec + "\" stroke-width=\"1\" stroke-opacity=\"0.2\"/></svg>";
    return { backgroundImage: "url(\"data:image/svg+xml," + encodeURIComponent(svg) + "\")", backgroundSize: "10px 10px" };
  }
}

function timeLabel(start, end) {
  if (!start) return null;
  return end ? (start + " - " + end) : start;
}

function EventChip({ ev, person, onClick, compact }) {
  const time = timeLabel(ev.startTime, ev.endTime);
  const border = "1.5px solid " + person.color;
  const ps = getPatternStyle(ev.type, person.color);
  const chipStyle = Object.assign({overflow:"hidden",background:person.light,border:border,borderRadius:compact?5:6,padding:compact?"2px 5px":"4px 7px",fontSize:compact?10:11,color:person.color,fontWeight:600,fontFamily:"'DM Mono',monospace",whiteSpace:compact?"nowrap":"normal",cursor:"pointer"}, ps);
  return (
    <div onClick={onClick} style={chipStyle}>
      {compact
        ? (ev.type + " - " + person.name + (time ? " " + time : ""))
        : <><div>{ev.type}</div><div style={{fontWeight:400,color:"#555"}}>{person.name}</div>{time&&<div style={{fontWeight:600,fontSize:10,color:person.color,opacity:.8,marginTop:1}}>{time}</div>}{ev.note&&<div style={{fontWeight:400,fontSize:10,color:"#777"}}>{ev.note}</div>}</>}
    </div>
  );
}

const EVENT_TYPES = ["CE","Meet & Greet","Hold"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const getToday = () => { const d=new Date(); return {year:d.getFullYear(),month:d.getMonth(),day:d.getDate()}; };
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const firstDay = (y,m) => new Date(y,m,1).getDay();
const dateKey = (y,m,d) => y + "-" + String(m+1).padStart(2,'0') + "-" + String(d).padStart(2,'0');

function exportICS(events, people) {
  const gp = id => people.find(p=>p.id===id)||people[0];
  const fmt = ds => ds.replace(/-/g,"")+"T090000Z";
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CE Scheduler//EN","CALSCALE:GREGORIAN"];
  events.forEach(ev => { const p=gp(ev.personId); lines.push("BEGIN:VEVENT","UID:"+ev.id+"@s","DTSTART:"+fmt(ev.date),"DTEND:"+fmt(ev.date),"SUMMARY:"+ev.type+" - "+p.name,"DESCRIPTION:"+(ev.note||""), "END:VEVENT"); });
  lines.push("END:VCALENDAR");
  const blob = new Blob([lines.join("\r\n")],{type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="scheduler.ics"; a.click();
  URL.revokeObjectURL(url);
}

    </div>
